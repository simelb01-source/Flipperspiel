<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Charlytaxi Air</title>
    <style>
        body {
            background-color: #000;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px 10px 10px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            box-sizing: border-box;
        }
        canvas {
            background-color: #000;
            border: 3px solid #ffcc00;
            box-shadow: 0 0 25px rgba(255, 204, 0, 0.4);
            border-radius: 8px;
            max-width: 100%;
            max-height: calc(100vh - 50px);
            touch-action: none; 
        }
        .info { 
            color: #888; 
            font-size: 12px; 
            margin-top: 15px; 
            text-align: center;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="400" height="600"></canvas>
    <div class="info">Handy: Linke Hälfte = Links | Rechte Hälfte = Rechts</div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playTone(freq, dur) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = freq;
            osc.type = "sine";
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + dur);
        }

        let score = 0;
        let highscore = localStorage.getItem("charlytaxi_highscore") || 0;
        let gameState = "ready"; 
        let launchPower = 0;

        const ball = { x: 350, y: 520, r: 8, dx: 0, dy: 0 };

        const flipY = 560;
        const flipLen = 95;
        let leftAngle = 0.5;
        let rightAngle = Math.PI - 0.5;

        const stars = Array.from({length: 60}, () => ({
            x: Math.random() * 400, 
            y: Math.random() * 600, 
            r: Math.random() * 1.5 + 0.5
        }));

        const bumpers = [
            { x: 200, y: 180, r: 30, pts: 500, col: "#ffcc00", label: "PAYERNE" },
            { x: 100, y: 270, r: 25, pts: 200, col: "#fff", label: "ALPEN" },
            { x: 300, y: 270, r: 25, pts: 200, col: "#fff", label: "ALPEN" },
            { x: 150, y: 360, r: 20, pts: 100, col: "#aaddff", label: "HOTEL" },
            { x: 250, y: 360, r: 20, pts: 100, col: "#aaddff", label: "HOTEL" }
        ];

        const keys = { left: false, right: false };

        window.addEventListener("keydown", function(e) {
            if (e.code === "ArrowLeft") keys.left = true;
            if (e.code === "ArrowRight") keys.right = true;
            if (e.code === "Space") {
                e.preventDefault();
                if (gameState === "ready" || gameState === "gameover") {
                    gameState = "launching"; 
                    launchPower = 0;
                }
                else if (gameState === "launching") { 
                    launchBall(); 
                }
            }
        });

        window.addEventListener("keyup", function(e) {
            if (e.code === "ArrowLeft") keys.left = false;
            if (e.code === "ArrowRight") keys.right = false;
        });

        function getTouchPos(e) {
            const rect = canvas.getBoundingClientRect();
            let touchX = e.touches[0].clientX - rect.left;
            return touchX * (canvas.width / rect.width);
        }

        canvas.addEventListener("touchstart", function(e) {
            e.preventDefault(); 
            let touchX = getTouchPos(e);
            if (gameState === "ready" || gameState === "gameover") {
                gameState = "launching"; 
                launchPower = 0;
            } else if (gameState === "playing") {
                if (touchX < 200) { keys.left = true; } 
                else { keys.right = true; }              
            }
        }, { passive: false });

        canvas.addEventListener("touchend", function(e) {
            e.preventDefault();
            if (gameState === "launching") { launchBall(); } 
            keys.left = false; 
            keys.right = false;
        }, { passive: false });

        function launchBall() {
            let powerMult = launchPower * 0.2;
            ball.dy = -powerMult - 5; 
            ball.dx = -2;
            gameState = "playing";
            playTone(600, 0.2);
        }

        function update() {
            if (gameState === "launching") { 
                if (launchPower < 100) { launchPower += 2; }
            }
            if (gameState !== "playing") { return; }

            ball.dy += 0.15;
            ball.x += ball.dx;
            ball.y += ball.dy;

            if (ball.dy > 15) { ball.dy = 15; }
            if (ball.dx > 15) { ball.dx = 15; }

            let leftTarget = keys.left ? -0.6 : 0.5;
            leftAngle += (leftTarget - leftAngle) * 0.4;
            
            let rightTarget = keys.right ? Math.PI + 0.6 : Math.PI - 0.5;
            rightAngle += (rightTarget - rightAngle) * 0.4;

            if (ball.x - ball.r < 40) { 
                ball.x = 40 + ball.r; 
                ball.dx = Math.abs(ball.dx) * 0.8; 
            }
            if (ball.x + ball.r > 360) { 
                ball.x = 360 - ball.r; 
                ball.dx = -Math.abs(ball.dx) * 0.8; 
            }
            if (ball.y - ball.r < 110) { 
                ball.y = 110 + ball.r; 
                ball.dy = Math.abs(ball.dy) * 0.8; 
            }

            for (let i = 0; i < bumpers.length; i++) {
                let b = bumpers[i];
                let dx = ball.x - b.x;
                let dy = ball.y - b.y;
                let dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 1) { dist = 1; }
                if (dist < ball.r + b.r) {
                    ball.dx = (dx / dist) * 7; 
                    ball.dy = (dy / dist) * 7; 
                    score += b.pts; 
                    playTone(800, 0.1); 
                }
            }

            // Linker Flügel
            if (ball.dy > 0) {
                if (ball.y > 530 && ball.y < 580) {
                    if (ball.x > 55 && ball.x < 185) {
                        if (keys.left) {
                            ball.dy = -13;
                            ball.dx += 4;
                        } else {
                            ball.dy = -ball.dy * 0.6;
                        }
                        ball.y = 529;
                        playTone(400, 0.1);
                    }
                }
            }

            // Rechter Flügel
            if (ball.dy > 0) {
                if (ball.y > 530 && ball.y < 580) {
                    if (ball.x > 215 && ball.x < 345) {
                        if (keys.right) {
                            ball.dy = -13;
                            ball.dx -= 4;
                        } else {
                            ball.dy = -ball.dy * 0.6;
                        }
                        ball.y = 529;
                        playTone(400, 0.1);
                    }
                }
            }

            if (ball.y > 620) {
                gameState = "gameover";
                if (score > highscore) { 
                    highscore = score; 
                    localStorage.setItem("charlytaxi_highscore", highscore); 
                }
                playTone(150, 0.5); 
            }
        }

        function draw() {
            // Hellerer Hintergrund
            let gradient = ctx.createLinearGradient(0, 0, 0, 600);
            gradient.addColorStop(0, "#0a1225"); 
            gradient.addColorStop(1, "#1a2d50"); 
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 400, 600);

            ctx.fillStyle = "#ffffff";
            for (let i = 0; i < stars.length; i++) {
                let s = stars[i];
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                ctx.fill();
            }

            ctx.fillStyle = "#0f1a30"; 
            ctx.beginPath();
            ctx.moveTo(0, 550);
            ctx.lineTo(80, 460);
            ctx.lineTo(140, 500);
            ctx.lineTo(200, 420);
            ctx.lineTo(260, 480);
            ctx.lineTo(320, 440);
            ctx.lineTo(400, 510);
            ctx.lineTo(400, 600);
            ctx.lineTo(0, 600);
            ctx.fill();

            // TITEL: Agency FB (Kondensiert, passt perfekt in den Rahmen)
            ctx.save();
            ctx.font = "bold 46px 'Agency FB', 'Arial Narrow', sans-serif";
            ctx.textAlign = "center";
            ctx.fillStyle = "#ffcc00";
            ctx.shadowColor = "#ffcc00";
            ctx.shadowBlur = 15;
            ctx.fillText("CHARLYTAXI AIR", 200, 78);
            ctx.restore();

            ctx.strokeStyle = "#334466";
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(40, 110); ctx.lineTo(40, 600); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(360, 110); ctx.lineTo(360, 600); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(40, 110); ctx.lineTo(360, 110); ctx.stroke();

            for (let i = 0; i < bumpers.length; i++) {
                let b = bumpers[i];
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
                if (b.col === "#ffcc00") { ctx.fillStyle = "#332200"; }
                else { ctx.fillStyle = "#0f1a30"; }
                ctx.fill();
                ctx.strokeStyle = b.col;
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.fillStyle = b.col;
                ctx.font = "bold 10px Arial";
                ctx.textAlign = "center";
                ctx.fillText(b.label, b.x, b.y + 4);
            }

            let lCosX = Math.cos(leftAngle);
            let lSinY = Math.sin(leftAngle);
            let rCosX = Math.cos(rightAngle);
            let rSinY = Math.sin(rightAngle);

            ctx.lineWidth = 12;
            ctx.lineCap = "round";
            ctx.strokeStyle = "#ffcc00";
            
            ctx.beginPath();
            ctx.moveTo(75, flipY);
            ctx.lineTo(75 + (lCosX * flipLen), flipY + (lSinY * flipLen));
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(325, flipY);
            ctx.lineTo(325 + (rCosX * flipLen), flipY + (rSinY * flipLen));
            ctx.stroke();

            if (gameState === "launching") {
                ctx.fillStyle = "#222";
                ctx.fillRect(370, 500, 20, 100);
                if (launchPower > 80) { ctx.fillStyle = "#ff3333"; }
                else if (launchPower > 40) { ctx.fillStyle = "#ffcc00"; }
                else { ctx.fillStyle = "#33ff33"; }
                ctx.fillRect(370, 600 - launchPower, 20, launchPower);
                ctx.strokeStyle = "#fff";
                ctx.strokeRect(370, 500, 20, 100);
            }

            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
            ctx.fillStyle = "#ffcc00";
            ctx.fill();
            ctx.lineWidth = 2;
            ctx.strokeStyle = "#000";
            ctx.stroke();

            ctx.fillStyle = "#fff";
            ctx.font = "14px Arial";
            ctx.textAlign = "left";
            ctx.fillText("SCORE: " + score, 50, 130);
            ctx.textAlign = "right";
            ctx.fillStyle = "#ffcc00";
            ctx.fillText("BEST: " + highscore, 350, 130);

            if (gameState === "ready") { drawText("Bereit", "Tippen & Halten"); }
            if (gameState === "gameover") { drawText("Abgestürzt", "Tippen für Neustart"); }
        }

        function drawText(t1, t2) {
            ctx.fillStyle = "rgba(0,0,0,0.8)";
            ctx.fillRect(80, 260, 240, 70);
            ctx.fillStyle = "#ffcc00";
            ctx.font = "bold 30px 'Agency FB', 'Arial Narrow', sans-serif";
            ctx.textAlign = "center";
            ctx.fillText(t1, 200, 290);
            ctx.fillStyle = "#fff";
            ctx.font = "12px Arial";
            ctx.fillText(t2, 200, 315);
        }

        function loop() { 
            update(); 
            draw(); 
            requestAnimationFrame(loop); 
        }
        
        loop();
    </script>
</body>
</html>
